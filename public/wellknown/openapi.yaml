openapi: 3.1.0
info:
  title: Alphine AI ACA API
  version: 1.0.0
  description: API for demo token generation and chat responses for Alphine AI Smart Call Assistant.

servers:
  - url: https://aca-realtime-gateway-clean.onrender.com

paths:
  /api/demo/token:
    post:
      operationId: createDemoToken
      summary: Create demo token
      description: Returns a short-lived demo token for the ACA demo flow.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties: {}
      responses:
        "200":
          description: Demo token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoTokenResponse"

  /api/chat:
    post:
      operationId: sendChatMessage
      summary: Send chat message
      description: Sends a user message to ACA and returns a conversational response.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ChatRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: The user's input message.

    DemoTokenResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        token:
          type: string
        expires_at:
          type: string
          description: Expiration timestamp if returned by the API.

    ChatResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        reply:
          type: string
        session_id:
          type: string
        source:
          type: string