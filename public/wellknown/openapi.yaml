openapi: 3.1.0
info:
  title: Alphine AI ACA Marketplace API
  version: 1.0.0
  description: Public demo API for Alphine AI Smart Call Assistant.

servers:
  - url: https://aca-realtime-gateway-clean.onrender.com

paths:
  /api/gpt/chat:
    post:
      operationId: sendGptChatMessage
      summary: Send a demo chat message
      description: Sends a safe demo conversation message to ACA and returns a structured response.
      x-openai-isConsequential: false
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Successful chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ChatRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: The user's message for the ACA demo assistant.
          minLength: 1
          maxLength: 2000

    ChatResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - reply
      properties:
        ok:
          type: boolean
          description: Whether the request succeeded.
        reply:
          type: string
          description: The assistant response text.
        session_id:
          type: string
          description: Demo session identifier.
        source:
          type: string
          description: Response source.

    ErrorResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string